<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AutoGear - Car Accessories Shop</title>

<style>
body{
font-family:Arial;
margin:0;
background:linear-gradient(135deg,#1e3c72,#2a5298);
}

header{
background:linear-gradient(90deg,#ff512f,#dd2476);
color:white;
text-align:center;
padding:20px;
}

nav{
display:flex;
justify-content:space-between;
padding:12px 20px;
background:#0f2027;
}

button{
padding:8px 14px;
border:none;
cursor:pointer;
border-radius:20px;
background:linear-gradient(45deg,#00c6ff,#0072ff);
color:white;
}

button:hover{
transform:scale(1.05);
}

.container{
padding:20px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:25px;
}

.card{
background:white;
padding:15px;
border-radius:15px;
box-shadow:0 6px 15px rgba(0,0,0,0.2);
text-align:center;
}

.card img{
width:100%;
height:150px;
object-fit:cover;
border-radius:10px;
}

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
justify-content:center;
align-items:center;
}

.modal-content{
background:white;
padding:25px;
border-radius:10px;
width:300px;
}

input{
width:100%;
padding:10px;
margin:8px 0;
border-radius:8px;
border:1px solid #ccc;
}

.cart{
background:linear-gradient(135deg,#43cea2,#185a9d);
padding:20px;
margin-top:20px;
border-radius:15px;
color:white;
}
</style>
</head>

<body>

<header>
<h1>AutoGear - Car Accessories</h1>
</header>

<nav>

<div>
<button onclick="openModal('login')">Login</button>
<button onclick="openModal('register')">Register</button>
</div>

<div>
<button onclick="toggleCart()">Cart (<span id="cartCount">0</span>)</button>
</div>

</nav>

<div class="container">

<div class="products" id="productList"></div>

<div class="cart" id="cartSection" style="display:none;">
<h3>Your Cart</h3>
<ul id="cartItems"></ul>
<p><strong>Total: ₹<span id="cartTotal">0</span></strong></p>
</div>

</div>

<div class="modal" id="modal">
<div class="modal-content" id="modalContent"></div>
</div>

<script>

const products = [

{id:1,name:"Car Seat Cover",price:2500,img:"https://images.jdmagicbox.com/quickquotes/images_main/car-seat-cover-black-luxury-leather-seat-with-head-rest-2217451260-2djovvlr.jpg"},

{id:2,name:"Steering Cover",price:800,img:"https://dukaan.b-cdn.net/700x700/webp/media/f082f3b5-574f-4e74-a506-1acf88eba85d.jpeg"},

{id:3,name:"LED Headlights",price:5000,img:"https://media.istockphoto.com/id/471158294/photo/led-highlight-for-a-new-black-car.jpg?s=612x612&w=0&k=20&c=ICP2UYI0w0v1Vo7lc5gdzqVVz27OSOgPYteXuK1Mqp0="},

{id:4,name:"Spoiler",price:2700,img:"https://static-cdn.cars24.com/prod/auto-news24-cms/CARS24-Blog-Images/2025/05/23/8c1e1fb9-bca3-4ed2-a7c2-fd3d2915c3af-spoiler--01.webp"},

{id:5,name:"Bumper",price:3000,img:"https://autobacsindia.com/wp-content/uploads/2024/10/Fire4X4-Front-Bumper-for-Toyota-Hilux1-1-600x600.jpg"},

{id:6,name:"Door Protector",price:600,img:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRu9DniiZ2Duew1FRzCALIzkW9pWY1a-vEerg&s"},

{id:7,name:"Rain Visor",price:1500,img:"https://carhatke.com/image/cache/catalog/doorvisor/car-window-visor-with-chrome-line-1-350x350.jpg"},

{id:8,name:"Side Step",price:6000,img:"https://api.hyundaimobisin.com/service/asset/accessory/2495-K3F37IH101_Side-Step_Silver_720x400.jpg"}

];

let cart = JSON.parse(localStorage.getItem("cart")) || [];

function displayProducts(){

const list=document.getElementById("productList");

list.innerHTML="";

products.forEach(p=>{

list.innerHTML+=`
<div class="card">
<img src="${p.img}">
<h3>${p.name}</h3>
<p>₹${p.price}</p>
<button onclick="addToCart(${p.id})">Add to Cart</button>
</div>
`;

});

}

function addToCart(id){

const product=products.find(p=>p.id===id);

cart.push(product);

localStorage.setItem("cart",JSON.stringify(cart));

updateCart();

}

function updateCart(){

document.getElementById("cartCount").innerText=cart.length;

const items=document.getElementById("cartItems");

const total=document.getElementById("cartTotal");

items.innerHTML="";

let sum=0;

cart.forEach((item,index)=>{

sum+=item.price;

items.innerHTML+=`
<li>
${item.name} - ₹${item.price}
<button onclick="removeFromCart(${index})" style="background:red;margin-left:10px;">Remove</button>
</li>
`;

});

total.innerText=sum;

}

function removeFromCart(index){

cart.splice(index,1);

localStorage.setItem("cart",JSON.stringify(cart));

updateCart();

}

function toggleCart(){

const cartSection=document.getElementById("cartSection");

cartSection.style.display=
cartSection.style.display==="none"?"block":"none";

}

function openModal(type){

const modal=document.getElementById("modal");

const content=document.getElementById("modalContent");

modal.style.display="flex";

if(type==="login"){

content.innerHTML=`
<h3>Login</h3>
<input type="email" id="loginEmail" placeholder="Email">
<input type="password" id="loginPassword" placeholder="Password">
<button onclick="login()">Login</button>
`;

}

else{

content.innerHTML=`
<h3>Register</h3>
<input type="text" id="regName" placeholder="Full Name">
<input type="email" id="regEmail" placeholder="Email">
<input type="text" id="regPhone" placeholder="Phone Number">
<input type="password" id="regPassword" placeholder="Password">
<input type="password" id="regConfirmPassword" placeholder="Confirm Password">
<button onclick="register()">Register</button>
`;

}

}

function register(){

const name=document.getElementById("regName").value;

const email=document.getElementById("regEmail").value;

const phone=document.getElementById("regPhone").value;

const password=document.getElementById("regPassword").value;

const confirmPassword=document.getElementById("regConfirmPassword").value;

if(password!==confirmPassword){

alert("Passwords do not match");

return;

}

const user={name,email,phone,password};

localStorage.setItem("user",JSON.stringify(user));

alert("Registration Successful");

closeModal();

}

function login(){

const email=document.getElementById("loginEmail").value;

const password=document.getElementById("loginPassword").value;

const user=JSON.parse(localStorage.getItem("user"));

if(user && user.email===email && user.password===password){

alert("Login Successful");

closeModal();

}

else{

alert("Invalid Credentials");

}

}

function closeModal(){

document.getElementById("modal").style.display="none";

}

window.onclick=function(e){

if(e.target.id==="modal"){

closeModal();

}

}

displayProducts();

updateCart();

</script>

</body>
</html>
