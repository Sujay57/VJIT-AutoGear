<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AutoGear - Car Accessories Shop</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header class="navbar">
<div class="logo">
<img src="https://img.freepik.com/premium-vector/gear-logo-automotive-mechanic-logo-design_445285-560.jpg">
</div>
<h1>AutoGear - Car Accessories</h1>
</header>

<nav>

<div>

<select onchange="displayProducts(this.value)">
<option value="all">All Products</option>
<option value="interior">Interior Accessories</option>
<option value="exterior">Exterior Accessories</option>
</select>

<button onclick="openModal('login')">Login</button>
<button onclick="openModal('register')">Register</button>

</div>

<div>
<button onclick="toggleCart()">Cart (<span id="cartCount">0</span>)</button>
</div>

</nav>

<div class="container">

<div class="products" id="productList"></div>

<div class="cart" id="cartSection" style="display:none;">
<h3>Your Cart</h3>
<ul id="cartItems"></ul>
<p><strong>Total: ₹<span id="cartTotal">0</span></strong></p>
</div>

</div>

<div class="modal" id="modal">
<div class="modal-content" id="modalContent"></div>
</div>

<script src="script.js"></script>

</body>
</html>
